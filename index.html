<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>소모품 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, outline-color 0.2s;
    }

    .input-row input:focus { border-color: #667eea; }
    .input-row input:focus-visible { outline: 2px solid #667eea; outline-offset: 2px; }

    .input-row button {
      padding: 10px 18px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #5a67d8; }
    .input-row button:disabled { opacity: 0.5; cursor: default; }

    .stats {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 16px;
    }

    .filter-row {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .filter-row button {
      padding: 6px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 20px;
      background: #fff;
      color: #4a5568;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-row button.active {
      background: #667eea;
      border-color: #667eea;
      color: #fff;
    }

    ul { list-style: none; }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: #f7fafc;
      transition: background 0.2s;
    }

    li:hover { background: #edf2f7; }

    li.done { background: #f0fff4; }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #48bb78;
      cursor: pointer;
      flex-shrink: 0;
    }

    li .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-word;
    }

    li.done .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    li .del-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    li .del-btn:hover { color: #e53e3e; background: #fff5f5; }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 40px 0;
      font-size: 0.95rem;
    }

    .clear-btn {
      width: 100%;
      margin-top: 16px;
      padding: 10px;
      background: none;
      border: 2px solid #fed7d7;
      border-radius: 10px;
      color: #e53e3e;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover { background: #fff5f5; }
    .clear-btn:disabled { opacity: 0.4; cursor: default; }

    .loading {
      text-align: center;
      color: #a0aec0;
      padding: 40px 0;
      font-size: 0.95rem;
    }

    .error-msg {
      background: #fff5f5;
      border: 1px solid #fed7d7;
      color: #e53e3e;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 12px;
      display: none;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🛒 소모품 리스트</h1>

  <div class="input-row">
    <input id="itemInput" type="text" placeholder="아이템 입력..." maxlength="80">
    <button id="addBtn" onclick="addItem()">추가</button>
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <div class="stats" id="stats"></div>

  <div class="filter-row">
    <button class="active" onclick="setFilter('all', this)">전체</button>
    <button onclick="setFilter('active', this)">미완료</button>
    <button onclick="setFilter('done', this)">완료</button>
  </div>

  <div class="loading" id="loading">불러오는 중...</div>
  <ul id="list"></ul>
  <div class="empty" id="empty" style="display:none">아이템이 없습니다</div>

  <button class="clear-btn" id="clearBtn" onclick="clearDone()">완료 항목 모두 삭제</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://ebtzlreeaoudejhnakfk.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVidHpscmVlYW91ZGVqaG5ha2ZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NDE1ODcsImV4cCI6MjA5MjExNzU4N30.6HaAqm8MY06QRKT6kO6dK90tHmNsFEbQb_jV0MppBc4';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let items = [];
  let filter = 'all';

  const input = document.getElementById('itemInput');
  input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = msg ? 'block' : 'none';
  }

  async function loadItems() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('list').innerHTML = '';
    document.getElementById('empty').style.display = 'none';

    const { data, error } = await db
      .from('shopping_items')
      .select('*')
      .order('created_at', { ascending: false });

    document.getElementById('loading').style.display = 'none';

    if (error) { showError('데이터를 불러오지 못했습니다: ' + error.message); return; }
    items = data;
    render();
  }

  async function addItem() {
    const text = input.value.trim();
    if (!text) return;

    const addBtn = document.getElementById('addBtn');
    addBtn.disabled = true;

    const { data, error } = await db
      .from('shopping_items')
      .insert({ text, done: false })
      .select()
      .single();

    addBtn.disabled = false;

    if (error) { showError('추가 실패: ' + error.message); return; }
    showError('');
    items.unshift(data);
    input.value = '';
    render();
  }

  async function toggleItem(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;

    const { error } = await db
      .from('shopping_items')
      .update({ done: !item.done })
      .eq('id', id);

    if (error) { showError('수정 실패: ' + error.message); return; }
    showError('');
    item.done = !item.done;
    render();
  }

  async function deleteItem(id) {
    const { error } = await db
      .from('shopping_items')
      .delete()
      .eq('id', id);

    if (error) { showError('삭제 실패: ' + error.message); return; }
    showError('');
    items = items.filter(i => i.id !== id);
    render();
  }

  async function clearDone() {
    const { error } = await db
      .from('shopping_items')
      .delete()
      .eq('done', true);

    if (error) { showError('삭제 실패: ' + error.message); return; }
    showError('');
    items = items.filter(i => !i.done);
    render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-row button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function render() {
    const list = document.getElementById('list');
    const empty = document.getElementById('empty');
    const stats = document.getElementById('stats');
    const clearBtn = document.getElementById('clearBtn');

    const total = items.length;
    const doneCount = items.filter(i => i.done).length;
    stats.textContent = total ? `총 ${total}개 · 완료 ${doneCount}개 · 미완료 ${total - doneCount}개` : '';

    const visible = items.filter(i => {
      if (filter === 'active') return !i.done;
      if (filter === 'done') return i.done;
      return true;
    });

    list.replaceChildren();
    visible.forEach(item => {
      const li = document.createElement('li');
      if (item.done) li.classList.add('done');

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = item.done;
      cb.onchange = () => toggleItem(item.id);

      const span = document.createElement('span');
      span.className = 'item-text';
      span.textContent = item.text;

      const del = document.createElement('button');
      del.className = 'del-btn';
      del.textContent = '✕';
      del.title = '삭제';
      del.onclick = () => deleteItem(item.id);

      li.append(cb, span, del);
      list.appendChild(li);
    });

    empty.style.display = visible.length === 0 ? 'block' : 'none';
    clearBtn.disabled = doneCount === 0;
  }

  loadItems();
</script>
</body>
</html>
